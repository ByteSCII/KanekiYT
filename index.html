<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InixPost | Sistema de Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-center">
            <i class="ph-fill ph-package"></i>
            <h1 class="splash-title">Inix<span>Post</span></h1>
            <div class="progress-track"><div id="progress-bar"></div></div>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="ph-bold ph-cube"></i></div>
                <h2 class="logo-text">InixPost</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="registro"><i class="ph ph-plus-circle"></i> Registro</button>
                <button class="nav-item" data-target="inventario"><i class="ph ph-stack"></i> Inventario</button>
                <div class="spacer"></div>
                <button class="nav-item" id="theme-toggle"><i class="ph ph-moon"></i> Modo Oscuro</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="tab-registro" class="view-section active">
                <div class="section-header">
                    <h2>Nuevo Producto</h2>
                    <p>Completa los datos para generar la etiqueta</p>
                </div>
                <div class="split-layout">
                    <div class="panel form-panel">
                        <div class="input-wrapper">
                            <label>Nombre</label>
                            <div class="input-box"><i class="ph ph-text-t"></i><input type="text" id="nombre" placeholder="Ej. Serum Facial"></div>
                        </div>
                        <div class="input-wrapper">
                            <label>Precio (USD)</label>
                            <div class="input-box"><i class="ph ph-currency-dollar"></i><input type="number" id="precio" step="0.01"></div>
                        </div>
                        <div class="input-wrapper">
                            <label>Categoría</label>
                            <div class="input-box">
                                <i class="ph ph-tag"></i>
                                <select id="categoria" class="modern-select">
                                    <option value="Cuidado Facial">Cuidado Facial</option>
                                    <option value="Maquillaje">Maquillaje</option>
                                    <option value="Cuidado Capilar">Cuidado Capilar</option>
                                    <option value="Accesorios">Accesorios</option>
                                </select>
                            </div>
                        </div>
                        <div class="upload-zone" id="upload_widget">
                            <i class="ph ph-image"></i><p>Subir Imagen</p>
                        </div>
                        <input type="hidden" id="image_url">
                        <button id="btnGuardar" class="btn-primary"><i class="ph ph-floppy-disk"></i> Guardar</button>
                    </div>
                    <div class="panel preview-panel">
                        <div class="ticket">
                            <img id="img-preview" src="https://placehold.co/400x300?text=InixPost">
                            <div class="ticket-info">
                                <h4 id="prev-name">Producto</h4>
                                <h2 id="prev-price">$0.00</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tab-inventario" class="view-section">
                <div class="section-header"><h2>Mi Inventario</h2></div>
                <div class="panel">
                    <table class="data-table">
                        <thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th class="text-right">Acciones</th></tr></thead>
                        <tbody id="inventory-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="barcode-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="printable-area">
                <div class="label-print">
                    <img src="./images/favicon.webp" class="print-favicon">
                    <p class="print-meta">PRODUCTO:</p>
                    <h3 id="print-product-name">Nombre</h3>
                    <div class="barcode-box"><svg id="modal-barcode-svg"></svg></div>
                </div>
            </div>
            <button id="btnPrint" class="btn-primary"><i class="ph ph-printer"></i> Imprimir</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="app.js"></script>
</body>
</html>
