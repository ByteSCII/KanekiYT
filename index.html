<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaneki Oficial - Configuraciones de Plugins Minecraft Gratuitas</title>
    <link rel="icon" href="./images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS MODERNOS CON TUS COLORES */
        :root {
            --gold: #FFD700;
            --gold-dark: #D4AF37;
            --sky-blue: #87CEEB;
            --night-blue: #0A1A2F;
            --dark-blue: #1E2A3A;
            --gray: #2A3B4C;
            --text: #E8F4F8;
            --text-light: #B0C4D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--night-blue);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* HERO SECTION CON FONDO ESTÁTICO */
        .hero-section {
            background: linear-gradient(rgba(10, 26, 47, 0.7), rgba(30, 42, 58, 0.8)), 
                        url('./images/fondo.jpg') no-repeat center center/cover;
            min-height: 100vh;
            position: relative;
            padding: 0;
        }

        /* HEADER SIMPLIFICADO */
        .header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo-img {
            height: 80px;
            width: auto;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, var(--sky-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* BOTÓN INGRESAR EN ESQUINA */
        .auth-button {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 1001;
        }

        .btn-ingresar {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--night-blue);
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-ingresar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        /* CONTENIDO HERO CENTRADO */
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--sky-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 3rem;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--night-blue);
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--sky-blue);
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
        }

        .btn-secondary:hover {
            background: rgba(135, 206, 235, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(135, 206, 235, 0.3);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .logo-img {
                height: 60px;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .hero-content h1 {
                font-size: 2.3rem;
            }

            .hero-content p {
                font-size: 1.1rem;
            }

            .btn-ingresar {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn-primary, .btn-secondary {
                width: 250px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                padding: 1rem;
            }

            .logo-img {
                height: 50px;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .hero-content h1 {
                font-size: 1.8rem;
            }

            .auth-button {
                top: 1rem;
                right: 1rem;
            }

            .btn-ingresar {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- HERO SECTION CON FONDO ESTÁTICO -->
    <section class="hero-section" id="inicio">
        <!-- HEADER SIMPLIFICADO -->
        <div class="header-container">
            <div class="nav-container">
                <a href="#inicio" class="logo-container">
                    <img src="./images/logo.png" alt="Kaneki" class="logo-img" onerror="this.style.display='none'">
                    <div class="logo-text">Kaneki</div>
                </a>
            </div>
        </div>

        <!-- BOTÓN INGRESAR EN ESQUINA -->
        <div class="auth-button">
            <a href="#" class="btn-ingresar">Ingresar</a>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="hero-content">
            <h1>Configuraciones de Plugins de Minecraft Gratuitas</h1>
            <p>Accede a configuraciones optimizadas, tutoriales exclusivos y únete a la comunidad de administradores más activa. Todo completamente gratis.</p>
            <div class="hero-buttons">
                <a href="descargas.html" class="btn btn-primary">Acceder a Descargas</a>
                <a href="tutoriales.html" class="btn btn-secondary">Ver Tutoriales</a>
            </div>
        </div>
    </section>

    <script>
        // Efectos de scroll suave
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Manejo de imágenes si no cargan
        document.addEventListener('DOMContentLoaded', function() {
            const logos = document.querySelectorAll('img[src*="logo.png"]');
            logos.forEach(logo => {
                logo.addEventListener('error', function() {
                    this.style.display = 'none';
                });
            });

            // Verificar si el fondo carga correctamente
            const heroSection = document.querySelector('.hero-section');
            const fondoImg = new Image();
            fondoImg.src = './images/fondo.jpg';
            fondoImg.onerror = function() {
                heroSection.style.background = 'linear-gradient(135deg, var(--night-blue) 0%, var(--dark-blue) 100%)';
            };
        });
    </script>
</body>
</html>
