<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaneki Oficial - Configuraciones de Plugins Minecraft Gratuitas</title>
    <link rel="icon" href="./images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS MODERNOS CON TUS COLORES */
        :root {
            --gold: #FFD700;
            --gold-dark: #D4AF37;
            --sky-blue: #87CEEB;
            --night-blue: #0A1A2F;
            --dark-blue: #1E2A3A;
            --gray: #2A3B4C;
            --text: #E8F4F8;
            --text-light: #B0C4D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--night-blue);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* HERO SECTION CON FONDO ESTÁTICO */
        .hero-section {
            background: linear-gradient(rgba(10, 26, 47, 0.7), rgba(30, 42, 58, 0.8)), 
                        url('./images/fondo.jpg') no-repeat center center/cover;
            min-height: 100vh;
            position: relative;
            padding: 0;
        }

        /* HEADER SIMPLIFICADO */
        .header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.5rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo-img {
            height: 80px;
            width: auto;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, var(--sky-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* BOTÓN INGRESAR EN ESQUINA */
        .auth-button {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 1001;
        }

        .btn-ingresar {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--night-blue);
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-ingresar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        /* ICONOS DE REDES SOCIALES */
        .social-icons {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            z-index: 1001;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-2px);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.6));
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
        }

        .discord-icon {
            background: #7289da;
        }

        .youtube-icon {
            background: #CE1312;
        }

        /* CONTENIDO HERO CENTRADO */
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--sky-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 3rem;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--night-blue);
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--sky-blue);
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
        }

        .btn-secondary:hover {
            background: rgba(135, 206, 235, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(135, 206, 235, 0.3);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .logo-img {
                height: 60px;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            /* ICONOS EN PARTE INFERIOR EN MÓVIL */
            .social-icons {
                top: auto;
                bottom: 2rem;
                left: 50%;
                transform: translateX(-50%);
                gap: 2rem;
            }

            .social-icon {
                width: 50px;
                height: 50px;
            }

            .social-icon svg {
                width: 28px;
                height: 28px;
            }

            .hero-content h1 {
                font-size: 2.3rem;
            }

            .hero-content p {
                font-size: 1.1rem;
                margin-bottom: 2.5rem;
            }

            .btn-ingresar {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }

            .btn-primary, .btn-secondary {
                width: 250px;
                text-align: center;
                padding: 1rem 2rem;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                padding: 1rem;
            }

            .logo-img {
                height: 50px;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .social-icons {
                bottom: 1.5rem;
                gap: 1.5rem;
            }

            .social-icon {
                width: 45px;
                height: 45px;
            }

            .social-icon svg {
                width: 24px;
                height: 24px;
            }

            .hero-content h1 {
                font-size: 1.8rem;
            }

            .auth-button {
                top: 1rem;
                right: 1rem;
            }

            .btn-ingresar {
                padding: 0.6rem 1.2rem;
                font-size: 0.8rem;
            }

            .hero-content {
                top: 45%;
            }
        }

        @media (max-width: 360px) {
            .social-icons {
                bottom: 1rem;
                gap: 1.2rem;
            }

            .social-icon {
                width: 40px;
                height: 40px;
            }

            .social-icon svg {
                width: 22px;
                height: 22px;
            }

            .hero-content h1 {
                font-size: 1.6rem;
            }

            .hero-content p {
                font-size: 1rem;
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- HERO SECTION CON FONDO ESTÁTICO -->
    <section class="hero-section" id="inicio">
        <!-- HEADER SIMPLIFICADO -->
        <div class="header-container">
            <div class="nav-container">
                <a href="#inicio" class="logo-container">
                    <img src="./images/logo.png" alt="Kaneki" class="logo-img" onerror="this.style.display='none'">
                    <div class="logo-text">Kaneki</div>
                </a>
            </div>
        </div>

        <!-- ICONOS DE REDES SOCIALES -->
        <div class="social-icons">
            <a href="#" class="social-icon discord-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#fff">
                    <path d="m346 392-21-25c41-11 57-39 57-39-52 49-194 51-249 0 0 0 14 26 56 39l-23 25c-70-1-97-48-97-48 0-104 46-187 46-187 47-33 90-33 90-33l3 4c-58 16-83 42-83 42 68-46 208-42 263 0 1-1-33-28-86-42l5-4s43 0 90 33c0 0 46 83 46 187 0 0-27 47-97 48z"/>
                    <ellipse cx="196" cy="279" rx="33" ry="35"/>
                    <ellipse cx="312" cy="279" rx="33" ry="35"/>
                </svg>
            </a>
            <a href="#" class="social-icon youtube-icon">
                <svg enable-background="new 0 0 128 128" viewBox="0 0 128 128" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="#fff">
                    <path d="M126.72,38.224c0,0-1.252-8.883-5.088-12.794c-4.868-5.136-10.324-5.16-12.824-5.458c-17.912-1.305-44.78-1.305-44.78-1.305h-0.056c0,0-26.868,0-44.78,1.305c-2.504,0.298-7.956,0.322-12.828,5.458C2.528,29.342,1.28,38.224,1.28,38.224S0,48.658,0,59.087v9.781c0,10.433,1.28,20.863,1.28,20.863s1.248,8.883,5.084,12.794c4.872,5.136,11.268,4.975,14.116,5.511c10.24,0.991,43.52,1.297,43.52,1.297s26.896-0.04,44.808-1.345c2.5-0.302,7.956-0.326,12.824-5.462c3.836-3.912,5.088-12.794,5.088-12.794S128,79.302,128,68.868v-9.781C128,48.658,126.72,38.224,126.72,38.224z M50.784,80.72L50.78,44.501l34.584,18.172L50.784,80.72z"/>
                </svg>
            </a>
        </div>

        <!-- BOTÓN INGRESAR EN ESQUINA -->
        <div class="auth-button">
            <a href="#" class="btn-ingresar">Ingresar</a>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="hero-content">
            <h1>Configuraciones de Plugins de Minecraft Gratuitas</h1>
            <p>Accede a configuraciones optimizadas, tutoriales exclusivos y únete a la comunidad de administradores más activa. Todo completamente gratis.</p>
            <div class="hero-buttons">
                <a href="descargas.html" class="btn btn-primary">Acceder a Descargas</a>
                <a href="tutoriales.html" class="btn btn-secondary">Ver Tutoriales</a>
            </div>
        </div>
    </section>

    <script>
        // Efectos de scroll suave
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Manejo de imágenes si no cargan
        document.addEventListener('DOMContentLoaded', function() {
            const logos = document.querySelectorAll('img[src*="logo.png"]');
            logos.forEach(logo => {
                logo.addEventListener('error', function() {
                    this.style.display = 'none';
                });
            });

            // Verificar si el fondo carga correctamente
            const heroSection = document.querySelector('.hero-section');
            const fondoImg = new Image();
            fondoImg.src = './images/fondo.jpg';
            fondoImg.onerror = function() {
                heroSection.style.background = 'linear-gradient(135deg, var(--night-blue) 0%, var(--dark-blue) 100%)';
            };
        });

        // Agregar enlaces a las redes sociales
        document.addEventListener('DOMContentLoaded', function() {
            const discordIcon = document.querySelector('.discord-icon');
            const youtubeIcon = document.querySelector('.youtube-icon');
            
            // Reemplaza con tus enlaces reales
            discordIcon.href = 'https://discord.gg/tu-enlace-discord';
            youtubeIcon.href = 'https://youtube.com/tu-canal';
        });
    </script>
</body>
</html>
