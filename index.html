<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Inventory | Pro Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

    <div class="glass-bg"></div>
    
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">JEAN<span>PRO</span></div>
            <nav>
                <button class="nav-item active"><i class="fas fa-plus-circle"></i> Registro</button>
                <button class="nav-item"><i class="fas fa-boxes"></i> Inventario</button>
            </nav>
        </aside>

        <main class="content">
            <header class="main-header">
                <h2>Gestión de Productos</h2>
                <div class="user-profile">Admin Jean</div>
            </header>

            <div class="grid-container">
                <section class="card form-section">
                    <h3>Añadir al Stock</h3>
                    <div class="input-field">
                        <label>Nombre del Producto</label>
                        <input type="text" id="nombre" placeholder="Nombre completo...">
                    </div>
                    
                    <div class="input-row">
                        <div class="input-field">
                            <label>Precio Unitario ($)</label>
                            <input type="number" id="precio" placeholder="0.00">
                        </div>
                        <div class="input-field">
                            <label>Categoría</label>
                            <select id="categoria">
                                <option value="Cuidado Facial">Cuidado Facial</option>
                                <option value="Maquillaje">Maquillaje</option>
                                <option value="Cuidado Corporal">Cuidado Corporal</option>
                            </select>
                        </div>
                    </div>
                    <button id="btnGuardar" class="btn-main">
                        <span id="btnText">Registrar Producto</span>
                        <div id="loader" class="loader" style="display:none;"></div>
                    </button>
                </section>

                <section class="card preview-section">
                    <h3>Vista de Etiqueta</h3>
                    <div id="barcodeContainer" class="barcode-card">
                        <div class="barcode-header">
                            <span id="label-cat">Categoría</span>
                            <span id="label-name">Producto</span>
                        </div>
                        <svg id="barcode"></svg>
                        <div class="barcode-footer">
                            <span id="label-price">$0.00</span>
                        </div>
                    </div>
                    <button onclick="window.print()" class="btn-outline">Imprimir PDF</button>
                </section>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
