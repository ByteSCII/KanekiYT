<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InixPost | Sistema de Gestión Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script> <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

    <div id="splash-screen">
        <div class="loader-content">
            <div class="logo-loader">INIX<span>POST</span></div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="loader-text">Sincronizando con la nube...</p>
        </div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="brand">IP</div>
            <nav class="menu">
                <button class="nav-btn active" onclick="showTab('registro')" title="Registro"><i class="fas fa-plus"></i></button>
                <button class="nav-btn" onclick="showTab('inventario')" title="Inventario"><i class="fas fa-boxes"></i></button>
                <button class="nav-btn" id="theme-toggle" title="Cambiar Tema"><i class="fas fa-moon"></i></button>
            </nav>
        </aside>

        <main class="main-body">
            <section id="tab-registro" class="tab-content active">
                <div class="header-main">
                    <h2>Panel de Registro</h2>
                    <p>Crea nuevos SKU en el sistema</p>
                </div>

                <div class="glass-grid">
                    <div class="form-card">
                        <div class="input-group">
                            <label>Nombre del Producto</label>
                            <input type="text" id="nombre" placeholder="Nombre comercial...">
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Precio USD</label>
                                <input type="number" id="precio" placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>Categoría</label>
                                <select id="categoria">
                                    <option value="Cuidado Facial">Cuidado Facial</option>
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Hogar">Hogar</option>
                                </select>
                            </div>
                        </div>
                        
                        <button id="upload_widget" class="btn-upload"><i class="fas fa-image"></i> Subir Imagen</button>
                        <input type="hidden" id="image_url">
                        
                        <button id="btnGuardar" class="btn-submit">Finalizar Registro</button>
                    </div>

                    <div class="preview-card" id="sticker">
                        <div class="sticker-content">
                            <img id="img-preview" src="https://via.placeholder.com/150" alt="Vista previa">
                            <h4 id="prev-name">Producto</h4>
                            <svg id="barcode"></svg>
                            <h3 id="prev-price">$0.00</h3>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tab-inventario" class="tab-content">
                <div class="header-main">
                    <h2>Inventario Global</h2>
                    <p>Listado de productos registrados en tiempo real</p>
                </div>
                <div class="table-container">
                    <table id="products-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
