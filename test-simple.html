<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Simple Firebase</title>
    <link rel="icon" type="image/webp" href="./images/favicon.webp">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Prueba Simple de Firebase</h1>
    <button onclick="testConnection()">Probar Conexión</button>
    <button onclick="createTestProduct()">Crear Producto de Prueba</button>
    <div id="results"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        function addResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function testConnection() {
            try {
                if (firebase.apps.length > 0) {
                    addResult('✅ Firebase conectado correctamente');
                } else {
                    addResult('❌ Firebase no inicializado', false);
                }
            } catch (error) {
                addResult(`❌ Error: ${error.message}`, false);
            }
        }

        async function createTestProduct() {
            try {
                const testProduct = {
                    name: 'Producto de Prueba',
                    description: 'Este es un producto de prueba',
                    price: 99.99,
                    sku: 'TEST123',
                    userId: 'demo-user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const docRef = await firebase.firestore().collection('products').add(testProduct);
                addResult(`✅ Producto creado con ID: ${docRef.id}`);
            } catch (error) {
                addResult(`❌ Error creando producto: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
