<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Firebase - BarCode Manager</title>
    <link rel="icon" type="image/webp" href="./images/favicon.webp">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🧪 Prueba de Conexión Firebase</h1>
    <p>Esta página verifica que Firebase esté configurado correctamente.</p>

    <button onclick="testFirebaseConnection()">Probar Conexión</button>
    <button onclick="testFirestoreConnection()">Probar Firestore</button>

    <div id="results"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        function addResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function testFirebaseConnection() {
            try {
                if (firebase.apps.length > 0) {
                    addResult('✅ Firebase inicializado correctamente');
                    addResult(`📋 Proyecto: ${firebaseConfig.projectId}`);
                } else {
                    addResult('❌ Firebase no está inicializado', false);
                }
            } catch (error) {
                addResult(`❌ Error en Firebase: ${error.message}`, false);
            }
        }

        async function testFirestoreConnection() {
            try {
                // Intentar leer la colección products
                const querySnapshot = await firebase.firestore().collection('products').limit(1).get();

                if (querySnapshot.empty) {
                    addResult('✅ Firestore conectado (colección products existe, pero está vacía)');
                } else {
                    addResult(`✅ Firestore conectado (${querySnapshot.size} productos encontrados)`);
                }
            } catch (error) {
                addResult(`❌ Error en Firestore: ${error.message}`, false);
                addResult('💡 Asegúrate de que Firestore esté activado en Firebase Console', false);
            }
        }

        // Ejecutar prueba automática al cargar
        window.onload = function() {
            testFirebaseConnection();
        };
    </script>
</body>
</html>
